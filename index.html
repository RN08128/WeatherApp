<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap');
    </style>
</head>

<body class="sunny">
    <h1>Weather App</h1>
    <div id="menu-box" class="sunny deactive">
        <div id="input-box">
            <img src="icons/pin.png" alt="">
            <input type="text" placeholder="Nome da localização" id="cidade-input">
            <button type="submit" id="buscar-button">Buscar</button>
        </div>
        <div id="weather-box" style="display: none;">
            <img src="" alt="" id="weather-icon">
            <h2 id="city-name"></h2>
        </div>
        <div id="weather-info">
            <h2 id="temperature"></h2>
            <p id="weather-description"></p>
        </div>
        <div id="weather-details-box" style="display: none;">
        </div>
        <div id="cards-container" style="display: none;">
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
